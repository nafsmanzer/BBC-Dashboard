function handleImportFile(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      // Validate it looks like our export
      if(!data._version||!data.sections){
        toast('❌ This doesn\'t look like a Newsroom Dashboard export file');
        input.value=''; return;
      }
      // Confirm before overwriting
      const storyCount=Object.values(data.sections||{}).reduce((s,a)=>s+(a?.length||0),0);
      const archCount=Object.keys(data.archive||{}).length;
      const msg=`Import this data?\n\n• ${storyCount} active stories\n• ${archCount} archive entries\n• ${(data.tasks||[]).length} tasks\n• Exported: ${data._exported?.slice(0,10)||'unknown date'}\n\nThis will replace all current data.`;
      if(!confirm(msg)){ input.value=''; return; }
      // Apply
      state.sections    = data.sections    || state.sections;
      state.remarks     = data.remarks     || '';
      state.archive     = data.archive     || {};
      state.tasks       = data.tasks       || [];
      state.meetings    = data.meetings    || [];
      state.notes       = data.notes       || [];
      state.leaves      = data.leaves      || [];
      state.employees   = data.employees   || state.employees;
      state.staffNames  = data.staffNames  || state.staffNames;
      state.sectionNames= data.sectionNames|| {};
      state.customPlatformLabels = data.customPlatformLabels || [];
      state.backupSnapshots = data.backupSnapshots || {weekly:[],monthly:[],yearly:[]};
      state.lastWeeklyBackup  = data.lastWeeklyBackup  || null;
      state.lastMonthlyBackup = data.lastMonthlyBackup || null;
      state.lastYearlyBackup  = data.lastYearlyBackup  || null;
      state.lastActiveDate = todayStr();
      // Ensure section arrays exist
      SECTIONS.forEach(s=>{ if(!state.sections[s.key]) state.sections[s.key]=[]; });
      saveAndPush();
      document.getElementById('import-modal')?.remove();
      input.value='';
      render(); renderDateStrip();
      toast('✓ Data imported successfully — '+storyCount+' stories, '+archCount+' archive entries');
    } catch(err){
      toast('❌ Could not read file: '+err.message);
      input.value='';
    }
  };
  reader.readAsText(file);
}
function sendMailto(subject, bodyText){
  const MAX=1800;
  let body=bodyText;
  let truncated=false;
  if(body.length>MAX){ body=body.slice(0,MAX)+'\n\n[... truncated — use Export .txt for full version]'; truncated=true; }
  const href='mailto:?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body);
  // Try window.open first (works in most browsers), then anchor click
  let opened=false;
  try {
    const win=window.open(href,'_self');
    if(win!==null) opened=true;
  } catch(e){}
  if(!opened){
    try {
      const a=document.createElement('a');
      a.href=href; a.style.display='none';
      document.body.appendChild(a); a.click();
      setTimeout(()=>{ try{document.body.removeChild(a);}catch(e){} },300);
      opened=true;
    } catch(e){}
  }
  // Always show fallback copy dialog so user can paste manually if mail client didn't open
  setTimeout(()=>{ showEmailFallback(subject,bodyText); },400);
  if(truncated) toast('Body was long — full version is in Export .txt');
}
function showEmailFallback(subject,body){
  // Fallback: show copy dialog if mailto is blocked
  if(document.getElementById('email-fallback-modal')) return;
  const m=document.createElement('div'); m.className='modal-bg'; m.id='email-fallback-modal';
  m.innerHTML=`<div class="modal" onclick="event.stopPropagation()" style="max-width:620px">
    <h2>✉ Email Content</h2>

    <div style="margin-bottom:10px">

      <input class="finput" value="${esc(subject)}" readonly onclick="this.select()">
    </div>
    <div>
      <div class="flabel" style="margin-bottom:4px">Body <span style="color:var(--text3);font-size:10px">(click to select all)</span></div>
      <textarea class="ftextarea" style="min-height:260px;font-family:var(--mono);font-size:11px" readonly onclick="this.select()">${esc(body)}</textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-accent" onclick="copyEmailBody('${encodeURIComponent(body)}')">📋 Copy body</button>
      <button class="btn btn-ghost" onclick="document.getElementById('email-fallback-modal').remove()">Close</button>
    </div>
  </div>`;
  m.addEventListener('click',e=>{ if(e.target===m) m.remove(); });

function copyEmailBody(encodedBody){

}
function doEmailSection(sec,archKey){

function initScrollHeader(){
  let lastY=0;
  let scrollTimer=null;
  window.addEventListener('scroll',()=>{
    const y=window.scrollY||document.documentElement.scrollTop;
    // Collapse on scroll down past 80px
    if(y>80 && !_headerCollapsed && y>lastY){
      collapseHeader();
    }
    // Only expand when truly back at top — use debounce to avoid flicker
    if(y===0 && _headerCollapsed){
      clearTimeout(scrollTimer);
      scrollTimer=setTimeout(()=>{
        const cur=window.scrollY||document.documentElement.scrollTop;
        if(cur===0) expandHeader();
      }, 120);
    }
    lastY=y;
  },{passive:true});
}

function addStoryTravel(sec,sid,type,data,archKey){
  const arr=getArr(sec,archKey); if(!arr) return;
  const s=arr.find(x=>x.id===sid); if(!s) return;
  if(!s.travel) s.travel=[];
  s.travel.push({id:genId(),type,data:{...data},created:Date.now()});
  saveAndPush(); render();
}
function updateStoryTravel(sec,sid,eid,data,archKey){
  const arr=getArr(sec,archKey); if(!arr) return;
  const s=arr.find(x=>x.id===sid); if(!s) return;
  const i=(s.travel||[]).findIndex(e=>e.id===eid);
  if(i>=0){s.travel[i]={...s.travel[i],data:{...s.travel[i].data,...data}};saveAndPush();render();}
}
function deleteStoryTravel(sec,sid,eid,archKey){
  const arr=getArr(sec,archKey); if(!arr) return;
  const s=arr.find(x=>x.id===sid); if(!s) return;
  s.travel=(s.travel||[]).filter(e=>e.id!==eid);
  saveAndPush(); render();
}
function moveStoryTravel(sec,sid,eid,dir,archKey){
  const arr=getArr(sec,archKey); if(!arr) return;
  const s=arr.find(x=>x.id===sid); if(!s||!s.travel) return;
  const i=s.travel.findIndex(e=>e.id===eid);
  if(dir==='up'&&i>0)[s.travel[i-1],s.travel[i]]=[s.travel[i],s.travel[i-1]];
  else if(dir==='down'&&i<s.travel.length-1)[s.travel[i],s.travel[i+1]]=[s.travel[i+1],s.travel[i]];
  saveAndPush(); render();
}

}

════════════════════════════════════════ */
function deadlineBadge(s){
  if(!s.deadline_date) return '';
  const dl=s.deadline_date+(s.deadline_uk?' '+s.deadline_uk:'');
  const diff=new Date(dl).getTime()-Date.now();
  const abs=Math.abs(diff), mins=Math.round(abs/60000);
  let txt;
  if(mins<60)    txt=(diff<0?'Overdue ':' Due ')+mins+'m';
  else if(mins<1440) txt=(diff<0?'Overdue ':' Due ')+Math.round(mins/60)+'h';
  else           txt=(diff<0?'Overdue ':' Due ')+Math.round(mins/1440)+'d';
  return `<span class="deadline-badge${diff<0?' overdue':''}">⏱${txt}</span>`;
}
function upcomingDueBadge(s){
  if(!s.expected_date) return '';
  const today=todayStr();
  if(s.expected_date<today) return `<span class="deadline-badge overdue">⚠ Overdue expected</span>`;
  if(s.expected_date===today) return `<span class="deadline-badge">📅 Due today</span>`;
  const diff=new Date(s.expected_date+'T00:00:00').getTime()-Date.now();
  const days=Math.ceil(diff/86400000);
  return `<span class="upcoming-due-badge">📅 in ${days}d</span>`;
}

/* ─── GLOBAL SEARCH ─── */
function storyMatchesSearch(s, q){
  const fields=[
    s.title, s.correspondent, s.producer, s.shoot_edit,
    s.location, s.field_location, s.remarks, s.req_name,
    s.req_team, s.detail, s.links,
    (s.remarksList||[]).map(r=>r.text).join(' '),
    s.completion_note,
  ];
  return fields.some(f=>(f||'').toLowerCase().includes(q));
}
function sectionMatchesSearch(sec, q){
  // Allow searching by section name — e.g. "ibu", "other stories", "requests", "note"
  const names=['ibu','other stories','other','requests','upcoming','note','notes','remarks','tasks','leaves'];
  const secMap={
    ibu:['ibu','india business'],
    other:['other','other stories'],
    requests:['request','requests','future'],
    upcoming:['upcoming'],
    notes:['note','notes','remarks'],
    tasks:['task','tasks'],
    leaves:['leave','leaves'],
  };
  for(const [key,terms] of Object.entries(secMap)){
    if(terms.some(t=>t.includes(q)||q.includes(t))) return key;
  }
  return null;
}
function renderSearchHTML(){
  const q=(ui.search||'').trim().toLowerCase();
  if(!q) return `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-msg">Start typing to search</div></div>`;

  const today=todayStr();
  const results=[]; // [{dateLabel, dateKey, section, sectionLabel, story, type}]

  // Helper: friendly date label
  const dlabel=key=>{
    if(!key||key==='today') return 'Today';
    if(key===yesterdayStr()) return 'Yesterday';
    if(key===tomorrowStr()) return 'Tomorrow';
    return archiveLabel(key);
  };

  // Check if query matches a section name — show all stories from that section across all dates
  const secHit=sectionMatchesSearch('',q);

  // ── Today ──
  SECTIONS.forEach(sec=>{
    if(sec.isUpcoming||sec.hidden) return;
    const arr=state.sections[sec.key]||[];
    arr.forEach(s=>{
      if(secHit===sec.key || storyMatchesSearch(s,q)){
        results.push({dateKey:'today',dateLabel:'Today',sec:sec.key,secLabel:secName(sec.key),story:s,type:'story'});
      }
    });
  });
  // Upcoming (today)
  (state.sections.upcoming||[]).forEach(s=>{
    if(secHit==='upcoming'||storyMatchesSearch(s,q)){
      results.push({dateKey:'today',dateLabel:'Today (Upcoming)',sec:'upcoming',secLabel:'Upcoming',story:s,type:'story'});
    }
  });
  // Notes
  if(secHit==='notes'||(state.notes||[]).some(n=>(n.text||'').toLowerCase().includes(q))){
    (state.notes||[]).filter(n=>secHit==='notes'||(n.text||'').toLowerCase().includes(q)).forEach(n=>{
      results.push({dateKey:'today',dateLabel:'Today',sec:'notes',secLabel:'Note',note:n,type:'note'});
    });
  }
  // Tasks
  if(secHit==='tasks'||(state.tasks||[]).some(t=>(t.title||'').toLowerCase().includes(q)||(t.notes||'').toLowerCase().includes(q))){
    (state.tasks||[]).filter(t=>secHit==='tasks'||(t.title||'').toLowerCase().includes(q)||(t.notes||'').toLowerCase().includes(q)).forEach(t=>{
      results.push({dateKey:'today',dateLabel:'Today',sec:'tasks',secLabel:'Tasks',task:t,type:'task'});
    });
  }
  // Leaves
  if(secHit==='leaves'||(state.leaves||[]).some(l=>(l.employeeName||'').toLowerCase().includes(q)||(l.reason||'').toLowerCase().includes(q))){
    (state.leaves||[]).filter(l=>secHit==='leaves'||(l.employeeName||'').toLowerCase().includes(q)||(l.reason||'').toLowerCase().includes(q)).forEach(l=>{
      results.push({dateKey:'today',dateLabel:'Leaves',sec:'leaves',secLabel:'Leave Tracker',leave:l,type:'leave'});
    });
  }

  // ── Archive ──
  Object.keys(state.archive).sort((a,b)=>b.localeCompare(a)).forEach(archKey=>{
    const entry=state.archive[archKey]; if(!entry) return;
    SECTIONS.forEach(sec=>{
      const arr=entry.sections?.[sec.key]||[];
      arr.forEach(s=>{
        if(secHit===sec.key||storyMatchesSearch(s,q)){
          results.push({dateKey:archKey,dateLabel:dlabel(archKey),sec:sec.key,secLabel:secName(sec.key),story:s,type:'story',archKey});
        }
      });
    });
  });

  if(!results.length){
    return`<div style="padding:24px 0">
      <div class="view-header" style="border:none;padding:0;margin-bottom:20px">
        <div>
          <div style="font-size:11px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.8px">Search results</div>
          <div style="font-size:20px;font-weight:700;font-family:var(--serif)">"${esc(q)}"</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="clearSearch()">✕ Clear</button>
      </div>
      <div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-msg">No results found for "${esc(q)}"</div></div>
    </div>`;
  }

  // Group by date key, today first then archive newest→oldest
  const dateOrder=['today'];
  results.forEach(r=>{ if(!dateOrder.includes(r.dateKey)) dateOrder.push(r.dateKey); });
  // Sort archive dates newest first
  const archDates=dateOrder.filter(k=>k!=='today').sort((a,b)=>b.localeCompare(a));
  const orderedDates=['today',...archDates];

  let html=`<div style="padding-bottom:24px">
    <div class="view-header" style="border:none;padding:0 0 16px;margin-bottom:0">
      <div>
        <div style="font-size:11px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.8px">Search results</div>
        <div style="font-size:20px;font-weight:700;font-family:var(--serif)">"${esc(q)}" — ${results.length} result${results.length===1?'':'s'}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="clearSearch()">✕ Clear</button>
    </div>`;

  orderedDates.forEach(dateKey=>{
    const dateResults=results.filter(r=>r.dateKey===dateKey);
    if(!dateResults.length) return;
    const lbl=dateResults[0].dateLabel;
    html+=`<div style="margin-bottom:18px">
      <div style="font-size:11px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)">${esc(lbl)}</div>`;
    dateResults.forEach(r=>{
      if(r.type==='story'&&r.story){
        const s=r.story;
        const archKeyJS=r.archKey?`'${r.archKey}'`:'null';
        const sbL=s.status==='urgent'?'🔴':s.status==='in-progress'?'🟡':s.status==='completed'?'🟢':s.status==='not-done'?'⚫':s.status==='on-hold'?'🟣':'';
        const secBadge=r.sec==='ibu'?'IBU':r.sec==='other'?'Other':r.secLabel;
        html+=`<div style="display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;-webkit-tap-highlight-color:transparent;"
          onclick="clearTimeout(_searchTimer);setView(${r.archKey?`'archive','${r.archKey}'`:"'today',null"});setTimeout(()=>{ ui.openCards.add('${s.id}');render(); },100)">
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.title||'Untitled')}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)">${secBadge}${s.correspondent?' · '+esc(s.correspondent):''}${sbL?' · '+sbL:''}</div>
          </div>
          <span style="font-size:11px;color:var(--text3);flex-shrink:0">›</span>
        </div>`;
      } else if(r.type==='note'&&r.note){
        const n=r.note;
        html+=`<div style="padding:11px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;border-left:3px solid var(--upcoming)">
          <div style="font-size:13px;color:var(--text);line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(n.text)}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:3px;font-family:var(--mono)">Note${n.status!=='active'?' · '+(n.status==='done'?'✅ Done':'↪ Passed'):''}</div>
        </div>`;
      } else if(r.type==='task'&&r.task){
        const t=r.task;
        const st=t.taskStatus==='done'?'✅':t.taskStatus==='not-done'?'⚫':'⏳';
        html+=`<div style="display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px">
          <span style="font-size:15px">${st}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.title||'Untitled')}</div>
            <div style="font-size:11px;color:var(--text3);font-family:var(--mono)">Task${t.deadline_date?' · '+t.deadline_date:''}</div>
          </div>
        </div>`;
      } else if(r.type==='leave'&&r.leave){
        const l=r.leave;
        html+=`<div style="padding:11px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;border-left:3px solid ${l.status==='approved'?'var(--done)':'var(--progress)'}">
          <div style="font-size:13px;font-weight:600;color:var(--text)">${esc(l.employeeName||'Unknown')}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)">${l.dateFrom} → ${l.dateTo} · ${l.status==='approved'?'✓ Approved':'⏳ Pending'}</div>
        </div>`;
      }
    });
    html+=`</div>`;
  });
  html+=`</div>`;
  return html;
}

  // On desktop: all sections scroll on Today page

            <button class="btn btn-ghost btn-sm" onclick="editNote('${n.id}')">✏ Edit</button>
          </div>`:''}
        </div>`;
      });
    }
    // Also show the free-text notes field for that date
    if(state.archive[cur]?.notes){

/* ─── ARCHIVE ─── */
function renderArchiveHTML(key){
  if(!key){ return `<div class="empty-state"><div class="empty-icon">📂</div><div class="empty-msg">Select a date above.</div></div>`; }
  const isYest=key===yesterdayStr(), isTomm=key===tomorrowStr();
  if(!state.archive[key]){
    if(isTomm){ state.archive[key]={type:'day',label:archiveLabel(key),sections:{ibu:[],other:[],requests:[],upcoming:[]},notes:'',created:Date.now()}; saveLocal(); }
    else return `<div class="view-header vh-archive"><div><div class="avh-label">Archive</div><div class="avh-title">${archiveLabel(key)}</div><div class="avh-meta">No data for this date.</div></div><div class="avh-actions"><button class="btn btn-ghost btn-sm" onclick="setView('today',null)">← Today</button></div></div>`;
  }
  const cnt=archiveStoryCount(key);
  const vhClass=isTomm?'vh-tomorrow':isYest?'vh-yesterday':'vh-archive';
  const lbl=isTomm?'Tomorrow — Pre-planning':isYest?"Yesterday's Board":'Archive';
  let html=`<div class="view-header ${vhClass}">
    <div>
      <div class="avh-label">${lbl}</div>
      <div class="avh-title">${archiveLabel(key)}</div>
      <div class="avh-meta">${cnt} stories${state.archive[key]?.created?' · Saved '+new Date(state.archive[key].created).toLocaleDateString('en-GB'):''}</div>
    </div>
    <div class="avh-actions">
      <button class="btn btn-ghost btn-sm" onclick="doEmailAll()">✉ Email</button>
      <button class="btn btn-ghost btn-sm" onclick="doExportTxt()">⬇ Export</button>
      ${!isTomm?`<button class="btn btn-ghost btn-sm btn-danger" onclick="deleteArchiveEntry('${key}')">🗑 Delete</button>`:''}
    </div>
  </div>`;
  if(isTomm) html+=`<div style="background:rgba(13,148,136,.07);border:1px solid rgba(13,148,136,.2);border-radius:8px;padding:10px 16px;margin-bottom:14px;font-size:12.5px;color:var(--tomorrow)">📋 <strong>Pre-planning for tomorrow.</strong> Use <strong>⇄ Migrate</strong> to send today's stories here.</div>`;
  SECTIONS.forEach(sec=>{ html+=renderAccordion(sec,key); });

  // Show any notes that were logged on this date (resolved notes archived here)
  const notesLog=state.archive[key]?.notesLog||[];
  const tasksLog=state.archive[key]?.tasksLog||[];
  if(notesLog.length||tasksLog.length){
    const statusLabel=n=>n._deleted?'🗑 Deleted':n.status==='done'?'✅ Done':n.status==='pass'||n.status==='passed'?'↪ Passed':'📌 Active';
    const cardCls=n=>n._deleted?'note-pass':n.status==='done'?'note-done':n.status==='pass'||n.status==='passed'?'note-pass':'';
    html+=`<div class="accordion">
      <div class="acc-header" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.acc-chevron').classList.toggle('open')">
        <span class="acc-icon">📝</span>
        <span class="acc-name">Notes on this day</span>
        <span style="font-size:10px;font-family:var(--mono);color:var(--text3);margin-left:8px">${notesLog.length} note${notesLog.length===1?'':'s'}</span>
        <span class="acc-chevron">▾</span>
      </div>
      <div class="acc-body" style="display:flex;flex-direction:column;gap:6px">
        ${notesLog.map(n=>`<div class="note-card ${cardCls(n)}">
          <div class="note-text" style="text-decoration:${n.status==='done'||n._deleted?'line-through':''}">${esc(n.text)}</div>
          <div class="note-meta">
            ${n.created?`<span>${new Date(n.created).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</span>`:''}
            <span>${statusLabel(n)}</span>
            ${n.deadline_date?`<span>📅 ${n.deadline_date}</span>`:''}
          </div>
        </div>`).join('')}
        ${tasksLog.map(t=>{
          const st=t._deleted?'🗑 Deleted':t.taskStatus==='done'?'✅ Done':t.taskStatus==='not-done'?'⚫ Not Done':t.taskStatus==='transferred'?'⇄ Transferred':'⏳ Pending';
          const strike=t._deleted||t.taskStatus==='done'?'text-decoration:line-through;':'';
          const op=t._deleted?'opacity:.6;':'';
          return`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:7px;${op}">
            <span style="font-size:12px">${t._deleted?'🗑':t.taskStatus==='done'?'✅':t.taskStatus==='not-done'?'⚫':'⏳'}</span>
            <div style="flex:1">
              <div style="font-size:12.5px;font-weight:600;color:var(--text);${strike}">${esc(t.title||'Untitled')}</div>
              <div style="font-size:10.5px;color:var(--text3);font-family:var(--mono)">Task · ${st}${t.deadline_date?' · '+t.deadline_date:''}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  html+=`<div class="accordion"><div class="acc-header" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.acc-chevron').classList.toggle('open')"><span class="acc-icon">📓</span><span class="acc-name">Free notes</span><span class="acc-chevron">▾</span></div><div class="acc-body"><textarea class="remarks-area" style="min-height:120px" placeholder="Notes for this entry…" oninput="updateArchiveNotes('${key}',this.value)">${esc(state.archive[key]?.notes||'')}</textarea></div></div>`;
  return html;
}

function buildCombinedStoriesHTML(archKey){
  const tab=ui.combinedSubTab||'all';
  const ibuArr=(archKey?state.archive[archKey]?.sections?.ibu:state.sections.ibu)||[];
  const otherArr=(archKey?state.archive[archKey]?.sections?.other:state.sections.other)||[];
  // Apply search + filter to each
  const filterArr=(arr)=>{
    let a=arr.filter(s=>s.status!=='shelved');
    if(ui.search){ const q=ui.search.toLowerCase(); a=a.filter(s=>(s.title||'').toLowerCase().includes(q)||(s.correspondent||'').toLowerCase().includes(q)||(s.producer||'').toLowerCase().includes(q)||(s.shoot_edit||'').toLowerCase().includes(q)||(s.remarks||'').toLowerCase().includes(q)); }
    if(ui.filter==='working')  return a.filter(s=>s.mode==='working');
    if(ui.filter==='watching') return a.filter(s=>s.mode==='watching');
    if(ui.filter!=='all')      return a.filter(s=>s.status===ui.filter);
    return a;
  };
  const ibuFiltered=filterArr(ibuArr).map(s=>({...s,_subsec:'ibu'}));
  const otherFiltered=filterArr(otherArr).map(s=>({...s,_subsec:'other'}));
  let stories=[];
  if(tab==='ibu')   stories=ibuFiltered;
  else if(tab==='other') stories=otherFiltered;
  else stories=[...ibuFiltered,...otherFiltered];

  if(!stories.length) return`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-msg">No stories here — click <strong>+ Add</strong></div></div>`;
  return stories.map(s=>renderCard(s._subsec||'ibu',s,archKey)).join('');
}

let ui_taskForm=false; // is the add-task form open?
let ui_editTaskId=null;
let ui_openTasks=new Set();

function addTask(data){
  if(!state.tasks) state.tasks=[];
  const id=genId();
  const today=todayStr();
  const t={...data, id, created:Date.now(), taskStatus:'pending', carriedForward:false, carriedFromDate:null, carriedDays:0};
  state.tasks.push(t);

  // Log to today's archive so it always appears when browsing that date
  if(!state.archive[today]){
    state.archive[today]={type:'day',label:archiveLabel(today),sections:{},notes:'',created:Date.now()};
    SECTIONS.forEach(s=>{state.archive[today].sections[s.key]=[];});
  }
  if(!state.archive[today].tasksLog) state.archive[today].tasksLog=[];
  if(!state.archive[today].tasksLog.some(x=>x.id===id)){
    state.archive[today].tasksLog.push({...t});
  }
  saveAndPush();
}
function updateTask(id,data){
  if(!state.tasks) return;
  const i=state.tasks.findIndex(t=>t.id===id);
  if(i>=0){ state.tasks[i]={...state.tasks[i],...data}; saveAndPush(); }
}
function deleteTask(id){
  const task=(state.tasks||[]).find(t=>t.id===id); if(!task) return;

  // Archive to creation date before permanent deletion
  const createdDate=task.carriedFromDate||(task.created?dateStr(new Date(typeof task.created==='number'?task.created:parseInt(task.created))):todayStr());
  if(!state.archive[createdDate]){
    state.archive[createdDate]={type:'day',label:archiveLabel(createdDate),sections:{},notes:'',created:Date.now()};
    SECTIONS.forEach(s=>{state.archive[createdDate].sections[s.key]=[];});
  }
  if(!state.archive[createdDate].tasksLog) state.archive[createdDate].tasksLog=[];
  if(!state.archive[createdDate].tasksLog.some(t=>t.id===id)){
    state.archive[createdDate].tasksLog.push({...task, deletedOn:Date.now(), _deleted:true});
  }

  state.tasks=state.tasks.filter(t=>t.id!==id);
  ui_openTasks.delete(id);
  saveAndPush(); renderDateStrip(); render();
}
function nextRecurrenceDate(task){
  const base=task.deadline_date||todayStr();
  const d=new Date(base+'T00:00:00');
  if(task.recurFreq==='daily'){
    d.setDate(d.getDate()+1);
  } else if(task.recurFreq==='weekly'){
    d.setDate(d.getDate()+7);
  } else if(task.recurFreq==='monthly'){
    d.setMonth(d.getMonth()+1);
  } else if(task.recurFreq==='custom' && task.recurDays>0){
    d.setDate(d.getDate()+parseInt(task.recurDays));
  }
  return dateStr(d);
}

function setTaskStatus(id, status, postponeTo){
  const upd={taskStatus:status};
  if(status==='done'){ upd.carriedForward=false; upd.doneAt=Date.now(); }
  if(status==='not-done'){ upd.carriedForward=false; upd.notDoneOn=Date.now(); }
  if(status==='pending'){ upd.carriedForward=false; upd.carriedDays=0; upd.carriedFromDate=null; }
  if(status==='postponed-to'&&postponeTo){ upd.postponeTo=postponeTo; }
  updateTask(id,upd);

  // Update archive log entry for this task on its creation date
  const task=(state.tasks||[]).find(t=>t.id===id);
  if(task){
    const createdDate=task.carriedFromDate||(task.created?dateStr(new Date(typeof task.created==='number'?task.created:parseInt(task.created))):todayStr());
    if(!state.archive[createdDate]){
      state.archive[createdDate]={type:'day',label:archiveLabel(createdDate),sections:{},notes:'',created:Date.now()};
      SECTIONS.forEach(s=>{state.archive[createdDate].sections[s.key]=[];});
    }
    if(!state.archive[createdDate].tasksLog) state.archive[createdDate].tasksLog=[];
    const li=state.archive[createdDate].tasksLog.findIndex(x=>x.id===id);
    const updatedTask={...task,...upd};
    if(li>=0) state.archive[createdDate].tasksLog[li]=updatedTask;
    else state.archive[createdDate].tasksLog.push(updatedTask);
    saveAndPush();
  }

  // If recurring task marked done — auto-create next occurrence
  if(status==='done'){
    const task2=(state.tasks||[]).find(t=>t.id===id);
    if(task2&&task2.isRecurring&&task2.recurFreq){
      const nextDate=nextRecurrenceDate(task2);
      const newTask={
        title:       task2.title,
        notes:       task2.notes||'',
        deadline_date: nextDate,
        reminder:    task2.reminder||'off',
        isRecurring: true,
        recurFreq:   task2.recurFreq,
        recurDays:   task2.recurDays||0,
        recurLabel:  task2.recurLabel||'',
      };
      addTask(newTask);
      toast('✓ Done — next occurrence created for '+nextDate);
    }
  }
  render();
}
function toggleTaskOpen(id){
  if(ui_openTasks.has(id)) ui_openTasks.delete(id); else ui_openTasks.add(id);
  const body=document.getElementById('task-body-'+id);
  const chev=document.getElementById('task-chev-'+id);
  if(body) body.classList.toggle('open',ui_openTasks.has(id));
  if(chev) chev.classList.toggle('open',ui_openTasks.has(id));
}
function submitTaskForm(){
  const g=id=>(document.getElementById(id)||{}).value||'';
  const isRecurring=document.getElementById('tf-recurring')?.checked||false;
  const data={
    title:        g('tf-title').trim(),
    notes:        g('tf-notes').trim(),
    deadline_date:g('tf-deadline-date'),
    reminder:     g('tf-reminder'),
    isRecurring,
    recurFreq:    isRecurring?g('tf-recur-freq'):'',
    recurDays:    isRecurring&&g('tf-recur-freq')==='custom'?parseInt(g('tf-recur-days'))||1:0,
    recurLabel:   isRecurring?g('tf-recur-label').trim():'',
  };
  if(!data.title){ toast('Please enter a task title'); return; }

    updateTask(ui_editTaskId, data);

  } else {

}
function editTask(id){
  const task=state.tasks?.find(t=>t.id===id); if(!task) return;
  ui_taskForm=true; ui_editTaskId=id;
  render();
  setTimeout(()=>{
    const set=(eid,val)=>{ const el=document.getElementById(eid); if(el) el.value=val||''; };
    set('tf-title',task.title);
    set('tf-notes',task.notes);
    set('tf-deadline-date',task.deadline_date);
    set('tf-reminder',task.reminder);
    const cb=document.getElementById('tf-recurring');
    if(cb){ cb.checked=!!task.isRecurring; toggleRecurringFields(); }
    if(task.isRecurring){
      set('tf-recur-freq', task.recurFreq||'daily');
      set('tf-recur-days', task.recurDays||7);
      set('tf-recur-label',task.recurLabel||'');
      toggleCustomDays();
    }
    document.getElementById('tasks-section')?.scrollIntoView({behavior:'smooth',block:'start'});
  },80);
}

function confirmTaskTransfer(id, mode){
  const dt=(document.getElementById('transfer-date-input')||{}).value;
  if(!dt){ toast('Pick a date first'); return; }
  const task=(state.tasks||[]).find(t=>t.id===id); if(!task) return;
  // Create archive entry for that date if needed
  if(!state.archive[dt]){
    state.archive[dt]={ type:'day', label:archiveLabel(dt), sections:{ibu:[],other:[],requests:[],upcoming:[]}, notes:'', created:Date.now() };
    SECTIONS.forEach(s=>{ if(!state.archive[dt].sections[s.key]) state.archive[dt].sections[s.key]=[]; });
  }
  // Store transferred task in the archive entry's notes (simplest approach — tasks live in state.tasks only)
  // We copy the task data as a new task record tagged to that date
  if(!state.archive[dt].tasks) state.archive[dt].tasks=[];
  const alreadyThere=state.archive[dt].tasks.some(t=>t.id===id);
  if(!alreadyThere){
    state.archive[dt].tasks.push({ ...task, transferredFrom:todayStr(), transferredOn:Date.now() });
  }
  if(mode==='move'){
    // Mark original as 'transferred' (keeps record but stops appearing in active list)
    updateTask(id,{ taskStatus:'transferred', transferredTo:dt });
    toast('Task transferred to '+dt+' ✓');
  } else {
    toast('Task copied to '+dt+' ✓');
  }
  document.getElementById('task-transfer-dlg')?.remove();
  render();
}

function renderTaskCard(t, today){
  const isOpen=ui_openTasks.has(t.id);
  const isOverdue=t.deadline_date&&t.deadline_date<today&&t.taskStatus!=='done';
  const isCarried=t.carriedForward&&t.taskStatus!=='done';
  const createdDate=new Date(t.created).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});

  // Card left-border class
  let cardCls='task-card ';
  if(t.taskStatus==='done') cardCls+='ts-done';
  else if(t.taskStatus==='not-done'||t.taskStatus==='transferred') cardCls+='ts-postponed';
  else if(isOverdue) cardCls+='ts-overdue';
  else if(t.taskStatus==='postponed-to') cardCls+='ts-postponed';
  else if(isCarried) cardCls+='ts-carried';
  else cardCls+='ts-pending';

  // Status badge
  let sbCls='task-status-badge ', sbTxt='';
  if(t.taskStatus==='done'){ sbCls+='tsb-done'; sbTxt='✓ Done'; }
  else if(t.taskStatus==='not-done'){ sbCls+='tsb-postponed'; sbTxt='⚫ Not Done'; }
  else if(t.taskStatus==='transferred'){ sbCls+='tsb-postponed'; sbTxt='→ Transferred'; }
  else if(t.taskStatus==='postponed-to'){ sbCls+='tsb-postponed'; sbTxt='⏸ Postponed'; }
  else if(isCarried){ sbCls+='tsb-carried'; sbTxt='🔁 Carried'; }
  else { sbCls+='tsb-pending'; sbTxt='⏳ Pending'; }

  // Deadline info
  let deadlineChip='';
  if(t.deadline_date){
    const diff=new Date(t.deadline_date+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime();
    const days=Math.round(diff/86400000);
    if(t.taskStatus==='done') deadlineChip=`<span class="task-chip">Deadline was ${t.deadline_date}</span>`;
    else if(days<0) deadlineChip=`<span class="task-chip overdue-chip">⚠ Overdue by ${Math.abs(days)}d</span>`;
    else if(days===0) deadlineChip=`<span class="task-chip overdue-chip">⚠ Due today</span>`;
    else deadlineChip=`<span class="task-chip">📅 Due in ${days}d (${t.deadline_date})</span>`;
  }
  const postponeChip=t.taskStatus==='postponed-to'&&t.postponeTo?`<span class="task-chip">⏸ Postponed to ${t.postponeTo}</span>`:'';
  const carriedChip=isCarried?`<span class="task-chip" style="color:var(--carry)">🔁 Carried ${t.carriedDays||1}d from ${t.carriedFromDate}</span>`:'';
  const doneChip=t.taskStatus==='done'&&t.doneAt?`<span class="task-chip" style="color:var(--done)">Done ${new Date(t.doneAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short'})}</span>`:'';

  const recurBadge=t.isRecurring?`<span class="recurring-badge">🔁 ${t.recurLabel||t.recurFreq||'recurring'}</span>`:'';
  return`<div class="${cardCls}" data-id="${t.id}">
  <div class="task-top" onclick="toggleTaskOpen('${t.id}')">
    <div style="flex:1;min-width:0">
      <div class="task-title${t.taskStatus==='done'?' done-title':''}">${esc(t.title||'Untitled')}</div>
      <div class="task-chips">
        <span class="task-chip">🗓 ${createdDate}</span>
        ${deadlineChip}${postponeChip}${carriedChip}${doneChip}${recurBadge}
      </div>
    </div>
    <div class="task-right">
      <span class="${sbCls}">${sbTxt}</span>
    </div>
    <button class="btn btn-ghost btn-xs btn-danger" style="flex-shrink:0;padding:3px 7px;margin-right:4px" onclick="event.stopPropagation();if(confirm('Delete this task?'))deleteTask('${t.id}')" title="Delete">🗑</button>
    <span class="chevron${isOpen?' open':''}" id="task-chev-${t.id}" style="margin-top:1px">▾</span>
  </div>
  <div class="task-body${isOpen?' open':''}" id="task-body-${t.id}">
    ${t.notes?`<div style="font-size:12.5px;color:var(--text2);line-height:1.6;margin-bottom:10px">${esc(t.notes)}</div>`:''}
    <div class="task-btns">
      ${t.taskStatus==='done'
        ? `<button class="btn btn-not-done btn-sm" onclick="setTaskStatus('${t.id}','pending');event.stopPropagation()">↩ Reopen</button>`
        : t.taskStatus==='not-done'
        ? `<span style="font-size:11px;color:var(--text3);font-family:var(--mono);padding:2px 0">⚫ Marked not done — won't carry forward</span>
           <button class="btn btn-postpone btn-sm" onclick="openTaskTransferDialog('${t.id}');event.stopPropagation()">📅 Transfer / Copy to date…</button>
           <button class="btn btn-ghost btn-sm" onclick="setTaskStatus('${t.id}','pending');event.stopPropagation()">↩ Reopen</button>`
        : t.taskStatus==='transferred'
        ? `<span style="font-size:11px;color:var(--text3);font-family:var(--mono)">→ Transferred to ${esc(t.transferredTo||'')}</span>
           <button class="btn btn-ghost btn-sm" onclick="setTaskStatus('${t.id}','pending');event.stopPropagation()">↩ Reopen here</button>`
        : `<button class="btn btn-done-active btn-sm" onclick="setTaskStatus('${t.id}','done');event.stopPropagation()">✅ Mark Done</button>
           <button class="btn btn-not-done btn-sm" onclick="setTaskStatus('${t.id}','not-done');event.stopPropagation()">⚫ Not Done</button>`
      }
      ${t.taskStatus!=='done'&&t.taskStatus!=='not-done'&&t.taskStatus!=='transferred'
        ? `<button class="btn btn-ghost btn-sm" onclick="openPostponeDialog('${t.id}');event.stopPropagation()">⏸ Postpone…</button>`
        : ''
      }
      <button class="btn btn-ghost btn-sm" onclick="editTask('${t.id}');event.stopPropagation()">✏ Edit</button>
      <button class="btn btn-ghost btn-sm btn-danger" onclick="event.stopPropagation();if(confirm('Delete this task?'))deleteTask('${t.id}')">🗑</button>
    </div>
  </div>
</div>`;
}

function renderCombinedAccordion(archKey){
  const isOpen=ui.openSections.has('ibu');
  const archKeyJS=archKey?`'${archKey}'`:'null';
  const ibuAll=(archKey?state.archive[archKey]?.sections?.ibu:state.sections.ibu)||[];
  const otherAll=(archKey?state.archive[archKey]?.sections?.other:state.sections.other)||[];
  const fKeyIbu='ibu'+(archKey?'::'+archKey:'');
  const fKeyOther='other'+(archKey?'::'+archKey:'');
  const isIBUFormOpen=ui.openForms.has(fKeyIbu);
  const isOtherFormOpen=ui.openForms.has(fKeyOther);

  const ibuActive=ibuAll.filter(s=>s.status!=='shelved');
  const otherActive=otherAll.filter(s=>s.status!=='shelved');
  const allActive=[...ibuActive,...otherActive];
  const shelvedAll=[...ibuAll,...otherAll].filter(s=>s.status==='shelved');
  const uc=allActive.filter(s=>s.status==='urgent').length;
  const ic=allActive.filter(s=>s.status==='in-progress').length;
  const cc=allActive.filter(s=>s.carriedForward&&s.status!=='completed'&&s.status!=='on-hold').length;

  // Apply search + global filter
  const applyFilter=(arr)=>{
    let a=[...arr];
    if(ui.search){ const q=ui.search.toLowerCase(); a=a.filter(s=>(s.title||'').toLowerCase().includes(q)||(s.correspondent||'').toLowerCase().includes(q)||(s.producer||'').toLowerCase().includes(q)||(s.shoot_edit||'').toLowerCase().includes(q)||(s.remarks||'').toLowerCase().includes(q)); }
    if(ui.filter==='working')  return a.filter(s=>s.mode==='working');
    if(ui.filter==='watching') return a.filter(s=>s.mode==='watching');
    if(ui.filter!=='all')      return a.filter(s=>s.status===ui.filter);
    return a;
  };
  const combinedFiltered=[
    ...applyFilter(ibuActive).map(s=>({...s,_subsec:'ibu'})),
    ...applyFilter(otherActive).map(s=>({...s,_subsec:'other'})),
  ];

let ui_noteForm=false;
let ui_openNotes=new Set();
let ui_editNoteId=null;

function editNote(id){
  const note=(state.notes||[]).find(n=>n.id===id); if(!note) return;
  ui_editNoteId=id;
  ui_noteForm=true;
  render();
  setTimeout(()=>{
    const t=document.getElementById('nf-text');
    const d=document.getElementById('nf-deadline');
    if(t) t.value=note.text||'';
    if(d) d.value=note.deadline_date||'';
    t?.focus();
  },60);
}

function addNote(data){
  if(!state.notes) state.notes=[];
  const id=genId();
  const today=todayStr();
  const note={...data, id, created:Date.now(), status:'active', carriedForward:false, carriedFromDate:null, carriedDays:0};
  state.notes.push(note);

  // Also log to today's archive so it always appears when browsing that date
  if(!state.archive[today]){
    state.archive[today]={type:'day',label:archiveLabel(today),sections:{},notes:'',created:Date.now()};
    SECTIONS.forEach(s=>{state.archive[today].sections[s.key]=[];});
  }
  if(!state.archive[today].notesLog) state.archive[today].notesLog=[];
  // Store reference — we'll refresh this log when status changes
  const existing=state.archive[today].notesLog.findIndex(n=>n.id===id);
  if(existing<0) state.archive[today].notesLog.push({...note});

  saveAndPush();
}
function updateNote(id, data){
  if(!state.notes) return;
  const i=state.notes.findIndex(n=>n.id===id);
  if(i>=0){ state.notes[i]={...state.notes[i],...data}; saveAndPush(); }
}
function deleteNote(id){
  const note=(state.notes||[]).find(n=>n.id===id); if(!note) return;

  // Archive to creation date before permanent deletion
  const createdDate=note.carriedFromDate||(note.created?dateStr(new Date(typeof note.created==='number'?note.created:parseInt(note.created))):todayStr());
  if(!state.archive[createdDate]){
    state.archive[createdDate]={type:'day',label:archiveLabel(createdDate),sections:{},notes:'',created:Date.now()};
    SECTIONS.forEach(s=>{state.archive[createdDate].sections[s.key]=[];});
  }
  if(!state.archive[createdDate].notesLog) state.archive[createdDate].notesLog=[];
  if(!state.archive[createdDate].notesLog.some(n=>n.id===id)){
    state.archive[createdDate].notesLog.push({...note, deletedOn:Date.now(), _deleted:true});
  }

  state.notes=(state.notes||[]).filter(n=>n.id!==id);
  saveAndPush(); renderDateStrip(); render();
}
function setNoteStatus(id, status){
  if(!state.notes) return;
  const note=state.notes.find(n=>n.id===id);
  if(!note) return;

  // Archive the note to its creation date so it's permanently recorded there
  const createdDate=note.carriedFromDate||(note.created?dateStr(new Date(typeof note.created==='number'?note.created:parseInt(note.created))):todayStr());
  if(!state.archive[createdDate]){
    state.archive[createdDate]={type:'day',label:archiveLabel(createdDate),sections:{},notes:'',created:Date.now()};
    SECTIONS.forEach(s=>{state.archive[createdDate].sections[s.key]=[];});
  }
  // Store resolved note in archive entry's notesLog array
  if(!state.archive[createdDate].notesLog) state.archive[createdDate].notesLog=[];
  const alreadyLogged=state.archive[createdDate].notesLog.some(n=>n.id===id);
  if(!alreadyLogged){
    state.archive[createdDate].notesLog.push({...note, status, resolvedOn:Date.now()});
  } else {
    const i=state.archive[createdDate].notesLog.findIndex(n=>n.id===id);
    if(i>=0) state.archive[createdDate].notesLog[i]={...note, status, resolvedOn:Date.now()};
  }

  updateNote(id,{status, resolvedOn:Date.now()});

  // Also update the archive log entry for this note on its creation date
  if(state.archive[createdDate]?.notesLog){
    const li=state.archive[createdDate].notesLog.findIndex(n=>n.id===id);
    if(li>=0) state.archive[createdDate].notesLog[li]={...state.archive[createdDate].notesLog[li], status, resolvedOn:Date.now()};
  }

  toast(status==='done'?'✅ Note marked Done — saved to '+archiveLabel(createdDate):'↪ Note passed — saved to '+archiveLabel(createdDate));
  renderDateStrip();
  render();
}
function toggleNotesResolved(){
  ui.notesResolvedOpen=!ui.notesResolvedOpen;
  render();
}
function submitNoteForm(){
  const g=id=>(document.getElementById(id)||{}).value||'';
  const text=g('nf-text').trim();
  if(!text){ toast('Enter a note'); return; }
  if(ui_editNoteId){
    updateNote(ui_editNoteId, { text, deadline_date:g('nf-deadline') });
    toast('Note updated ✓');
    ui_editNoteId=null;
  } else {
    addNote({ text, deadline_date:g('nf-deadline') });
    toast('Note added ✓');
  }
  ui_noteForm=false;
  render();
}
function toggleNoteOpen(id){
  if(ui_openNotes.has(id)) ui_openNotes.delete(id); else ui_openNotes.add(id);
  render();
}

let ui_meetingForm=false;
let ui_editMeetingId=null;
let ui_openMeetings=new Set();
let ui_meetingRemarkForms={}; // meetingId → true/false
let ui_editMeetingRemarkId={}; // meetingId → remarkId

function addMeeting(data){
  if(!state.meetings) state.meetings=[];
  state.meetings.push({...data, id:genId(), created:Date.now(), remarks:[]});
  saveAndPush();
}
function updateMeeting(id,data){
  const i=(state.meetings||[]).findIndex(m=>m.id===id);
  if(i>=0){ state.meetings[i]={...state.meetings[i],...data}; saveAndPush(); }
}
function deleteMeeting(id){
  state.meetings=(state.meetings||[]).filter(m=>m.id!==id);
  ui_openMeetings.delete(id);
  saveAndPush(); render();
}
function addMeetingRemark(id, text){
  const m=(state.meetings||[]).find(m=>m.id===id); if(!m) return;
  if(!m.remarks) m.remarks=[];
  m.remarks.push({id:genId(), text, created:Date.now()});
  saveAndPush(); render();
}
function updateMeetingRemark(meetingId, remarkId, text){
  const m=(state.meetings||[]).find(m=>m.id===meetingId); if(!m) return;
  const r=(m.remarks||[]).find(r=>r.id===remarkId); if(!r) return;
  r.text=text; r.edited=Date.now();
  saveAndPush(); render();
}
function deleteMeetingRemark(meetingId, remarkId){
  const m=(state.meetings||[]).find(m=>m.id===meetingId); if(!m) return;
  m.remarks=(m.remarks||[]).filter(r=>r.id!==remarkId);
  saveAndPush(); render();
}
function submitMeetingForm(){
  const g=id=>(document.getElementById(id)||{}).value||'';
  const isRecurring=document.getElementById('mf-recurring')?.checked||false;
  // Collect participants
  const participants=[];
  document.querySelectorAll('.mf-participant-row').forEach(row=>{
    const name=row.querySelector('.mf-p-name')?.value?.trim();
    const isExt=row.querySelector('.mf-p-ext')?.checked||false;
    if(name) participants.push({name, isExternal:isExt});
  });
  // Collect days of week if recurring weekly
  const recurDaysOfWeek=[];
  if(isRecurring){
    ['sun','mon','tue','wed','thu','fri','sat'].forEach(d=>{
      if(document.getElementById('mf-dow-'+d)?.checked) recurDaysOfWeek.push(d);
    });
  }
  const data={
    date:           g('mf-date'),
    name:           g('mf-name').trim(),
    time:           g('mf-time'),
    status:         g('mf-status')||'scheduled',
    isRecurring,
    recurFreq:      isRecurring?g('mf-recur-freq'):'',
    recurDaysOfWeek:isRecurring?recurDaysOfWeek:[],
    recurDays:      isRecurring&&g('mf-recur-freq')==='custom'?parseInt(g('mf-recur-days'))||1:0,
    agenda:         g('mf-agenda').trim(),
    participants,
    venue:          g('mf-venue').trim(),
    reminder:       g('mf-reminder'),
    reminderNote:   g('mf-reminder-note').trim(),
  };
  if(!data.name){ toast('Please enter a meeting name'); return; }
  if(!data.date){ toast('Please set a date'); return; }
  if(ui_editMeetingId){
    updateMeeting(ui_editMeetingId, data);
    toast('Meeting updated ✓');
    ui_editMeetingId=null;
  } else {
    addMeeting(data);
    toast('Meeting added ✓');
  }
  ui_meetingForm=false;
  render();
}
function submitMeetingRemark(meetingId){
  const ta=document.getElementById('mrf-text-'+meetingId);
  const text=(ta?.value||'').trim();

  addMeetingRemark(meetingId, text);

}
function submitMeetingRemarkEdit(meetingId, remarkId){
  const ta=document.getElementById('mref-text-'+meetingId+'-'+remarkId);
  const text=(ta?.value||'').trim();
  if(!text){ toast('Enter remark text'); return; }

function editMeeting(id){
  const m=(state.meetings||[]).find(m=>m.id===id); if(!m) return;
  ui_meetingForm=true; ui_editMeetingId=id;
  render();
  setTimeout(()=>{
    const set=(eid,val)=>{ const el=document.getElementById(eid); if(el) el.value=val||''; };
    set('mf-date', m.date); set('mf-name', m.name); set('mf-time', m.time);
    set('mf-status', m.status||'scheduled'); set('mf-agenda', m.agenda||'');
    set('mf-venue', m.venue||''); set('mf-reminder', m.reminder||'off');
    set('mf-reminder-note', m.reminderNote||'');
    if(m.isRecurring&&document.getElementById('mf-recurring')){

      set('mf-recur-freq', m.recurFreq||'daily');

function renderMeetingsSection(){

  const isOpen=ui.openSections.has('meetings');
  const today=todayStr();
  const meetings=[...state.meetings].sort((a,b)=>{
    const da=(a.date||'')+(a.time||'');

function renderRemarksAccordion(){
  if(!state.notes) state.notes=[];
  const isOpen=ui.openSections.has('remarks');
  const today=todayStr();
  const active=state.notes.filter(n=>n.status==='active');
  const resolved=state.notes.filter(n=>n.status!=='active');

  let body='';

  // Add-note form
  if(ui_noteForm){
    body+=`<div class="note-add-form">
      <div style="font-size:12.5px;font-weight:700;color:var(--upcoming);margin-bottom:10px">${ui_editNoteId?'✏ Edit Note':'+ New Note'}</div>
      <div class="fgroup" style="margin-bottom:8px">
        <label class="flabel">Note *</label>
        <textarea class="ftextarea" id="nf-text" placeholder="Write your note…" style="min-height:72px"></textarea>
      </div>
      <div class="fgroup" style="margin-bottom:10px">
        <label class="flabel">Deadline (optional)</label>
        <input class="finput" type="date" id="nf-deadline">
      </div>
      <div style="display:flex;gap:7px">
        <button class="btn btn-accent btn-sm" onclick="submitNoteForm()">${ui_editNoteId?'Update Note':'Add Note'}</button>
        <button class="btn btn-ghost btn-sm" onclick="ui_noteForm=false;ui_editNoteId=null;render()">Cancel</button>
      </div>
    </div>`;
  }

  // Active notes
  if(!active.length && !ui_noteForm){
    body+=`<div class="empty-state" style="padding:16px 0"><div class="empty-icon">📝</div><div class="empty-msg">No notes yet — click <strong>+ Add Note</strong></div></div>`;
  } else {
    active.forEach(n=>{
      const created=new Date(n.created).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
      let dlChip='';
      if(n.deadline_date){
        const diff=new Date(n.deadline_date+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime();
        const days=Math.round(diff/86400000);
        if(days<0)       dlChip=`<span class="note-deadline-chip">⚠ Overdue by ${Math.abs(days)}d</span>`;
        else if(days===0)dlChip=`<span class="note-deadline-chip">⚠ Due today</span>`;
        else             dlChip=`<span class="note-deadline-chip ok">📅 Due in ${days}d (${n.deadline_date})</span>`;
      }
      const carriedChip=n.carriedForward?`<span style="color:var(--carry);font-family:var(--mono);font-size:10px">🔁 Carried ${n.carriedDays||1}d</span>`:'';
      body+=`<div class="note-card${n.carriedForward?' note-carried':''}">
        <div class="note-text">${esc(n.text)}</div>
        <div class="note-meta">
          <span>🗓 ${created}</span>
          ${dlChip}
          ${carriedChip}
        </div>
        <div class="note-btns">
          <button class="btn btn-done-active btn-sm" onclick="setNoteStatus('${n.id}','done');event.stopPropagation()">✅ Done</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--text3)" onclick="setNoteStatus('${n.id}','pass');event.stopPropagation()">↪ Pass</button>
          <button class="btn btn-ghost btn-sm" onclick="editNote('${n.id}');event.stopPropagation()">✏ Edit</button>
          <button class="btn btn-ghost btn-sm btn-danger" onclick="deleteNote('${n.id}');event.stopPropagation()">🗑</button>
        </div>
      </div>`;
    });
  }

  // Resolved notes — always visible, faded
  if(resolved.length){
    body+=`<div style="font-size:10.5px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.6px;margin:10px 0 6px;padding-top:8px;border-top:1px dashed var(--border)">✓ ${resolved.length} resolved</div>`;
    resolved.forEach(n=>{
      const created=new Date(n.created).toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
      body+=`<div class="note-card ${n.status==='done'?'note-done':'note-pass'}">
        <div class="note-text" style="text-decoration:${n.status==='done'?'line-through':''}">${esc(n.text)}</div>
        <div class="note-meta">
          <span>🗓 ${created}</span>
          <span style="color:${n.status==='done'?'var(--done)':'var(--text3)'}">${n.status==='done'?'✅ Done':'↪ Passed'}</span>
        </div>
        <div class="note-btns">
          <button class="btn btn-ghost btn-xs" onclick="updateNote('${n.id}',{status:'active',resolvedOn:null});render()">↩ Restore</button>
          <button class="btn btn-ghost btn-xs" onclick="editNote('${n.id}')">✏ Edit</button>
          <button class="btn btn-ghost btn-xs btn-danger" onclick="deleteNote('${n.id}')">🗑</button>
        </div>
      </div>`;
    });
  }

  return`<div class="accordion${isOpen?' acc-open':''}" id="acc-remarks">
    <div class="acc-header" onclick="toggleAccordion('remarks')">
      <span class="acc-icon">📝</span>
      <span class="acc-name">Note</span>
      <div class="acc-meta">
        ${active.length?`<span class="sbadge sb-in-progress">${active.length} active</span>`:''}
        ${state.notes.filter(n=>n.carriedForward&&n.status==='active').length?`<span style="font-size:10px;color:var(--carry);background:var(--carry-bg);border:1px solid rgba(234,88,12,.2);padding:2px 7px;border-radius:12px;font-family:var(--mono)">🔁 carried</span>`:''}
      </div>
      <span class="acc-chevron${isOpen?' open':''}" id="acc-chev-remarks">▾</span>
    </div>
    <div class="acc-body${isOpen?' open':''}" id="acc-body-remarks">
      <div class="sec-head">
        <button class="btn btn-accent btn-sm" onclick="ui_noteForm=!ui_noteForm;render();setTimeout(()=>document.getElementById('nf-text')?.focus(),60)">+ Add Note</button>
      </div>
      ${body}
    </div>
  </div>`;
}

/* Returns sorted unique staff names for leave dropdown */
function getLeaveStaffNames(){
  const sn=state.staffNames||{};
  const all=[
    ...(sn.correspondents||[]),
    ...(sn.producers||[]),
    ...(sn.shootEdit||[]),
  ];
  // Deduplicate and sort alphabetically
  return [...new Set(all)].sort((a,b)=>a.localeCompare(b));
}
function getLeaveEmployeeOptions(){
  const names=getLeaveStaffNames();
  if(!names.length) return '<option value="">— No staff names set (add via 👥 Staff) —</option>';
  return names.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join('');
}

const LEAVE_TYPES=[
  {key:'earned',   label:'Earned Leave',              cls:'ltb-earned'},
  {key:'sick',     label:'Sick Leave',                cls:'ltb-sick'},
  {key:'casual',   label:'Casual / Comp Leave',       cls:'ltb-casual'},
  {key:'deployed', label:'Other Department',         cls:'ltb-earned'},
];
let ui_leaveForm=false, ui_editLeaveId=null;
let ui_openLeaves=new Set(), ui_showLeaveSettings=false, ui_showPastLeaves=false;

function leaveDays(from,to){
  if(!from||!to) return 0;
  return Math.max(1,Math.round((new Date(to+'T00:00:00')-new Date(from+'T00:00:00'))/86400000)+1);
}
function getOnLeaveToday(){
  const today=todayStr();
  return(state.leaves||[]).filter(l=>l.dateFrom&&l.dateTo&&l.dateFrom<=today&&l.dateTo>=today);
}
function renderOnLeavePill(){
  const wrap=document.getElementById('onleave-pill-wrap');
  if(!wrap) return;
  const onLeave=getOnLeaveToday();
  if(!onLeave.length){ wrap.innerHTML=''; return; }
  const hasPending=onLeave.some(l=>l.status==='pending');
  const names=onLeave.map(l=>(l.employeeName||'?').split(' ')[0]).join(', ');
  wrap.innerHTML=`<div class="onleave-pill${hasPending?' has-pending':''}" onclick="jumpToLeaves()" title="Click to view leave details">🌴 On leave: ${esc(names)}</div>`;
}
function addLeave(data){
  if(!state.leaves)state.leaves=[];
  state.leaves.push({...data,id:genId(),created:Date.now()});
  saveAndPush();
}
function updateLeave(id,data){
  if(!state.leaves)return;
  const i=state.leaves.findIndex(l=>l.id===id);
  if(i>=0){state.leaves[i]={...state.leaves[i],...data};saveAndPush();}
}
function deleteLeave(id){
  state.leaves=(state.leaves||[]).filter(l=>l.id!==id);
  ui_openLeaves.delete(id);saveAndPush();render();
}
function submitLeaveForm(){
  const g=id=>(document.getElementById(id)||{}).value||'';
  const empName=g('lf-employee');
  const data={
    employeeName: empName,
    leaveType:    g('lf-type'),
    dateFrom:     g('lf-from'),
    dateTo:       g('lf-to'),
    status:       g('lf-status'),
    reason:       g('lf-reason').trim(),
  };
  if(!data.employeeName){ toast('Please select an employee'); return; }
  if(!data.dateFrom||!data.dateTo){ toast('Please set start and end dates'); return; }
  if(data.dateTo<data.dateFrom){ toast('End date must be on or after start date'); return; }
  if(ui_editLeaveId){ updateLeave(ui_editLeaveId,data); toast('Leave updated ✓'); ui_editLeaveId=null; }
  else { addLeave(data); toast('Leave added ✓'); }
  ui_leaveForm=false; render();
  setTimeout(()=>document.getElementById('leaves-section')?.scrollIntoView({behavior:'smooth',block:'start'}),80);
}
function editLeave(id){
  const l=(state.leaves||[]).find(l=>l.id===id);if(!l)return;
  ui_leaveForm=true;ui_editLeaveId=id;render();
  setTimeout(()=>{
    const set=(eid,val)=>{const el=document.getElementById(eid);if(el)el.value=val||'';};
    set('lf-employee', l.employeeName||'');
    set('lf-type',     l.leaveType||'earned');
    set('lf-from',     l.dateFrom||'');
    set('lf-to',       l.dateTo||'');
    set('lf-status',   l.status||'pending');
    set('lf-reason',   l.reason||'');
    document.getElementById('leaves-section')?.scrollIntoView({behavior:'smooth',block:'start'});
  },80);
}
function toggleLeaveOpen(id){
  if(ui_openLeaves.has(id))ui_openLeaves.delete(id);else ui_openLeaves.add(id);
  const b=document.getElementById('lb-'+id),c=document.getElementById('lc-'+id);
  if(b)b.classList.toggle('open',ui_openLeaves.has(id));
  if(c)c.classList.toggle('open',ui_openLeaves.has(id));
}
function saveEmployeeNames(){
  const names=[];
  for(let i=0;i<5;i++){
    const el=document.getElementById('emp-name-'+i);
    names.push((el?.value||'').trim()||('Employee '+(i+1)));
  }
  state.employees=names;
  (state.leaves||[]).forEach(l=>{if(l.employeeIdx!=null)l.employeeName=names[l.employeeIdx];});
  saveAndPush();toast('Employee names saved ✓');
  ui_showLeaveSettings=false;render();
}

function addStaffRow(listId){
  const list=document.getElementById(listId); if(!list) return;
  const idx=list.children.length;
  const row=document.createElement('div');

  row.innerHTML=`<input class="finput" data-idx="${idx}" placeholder="Name" style="flex:1"><button class="btn btn-ghost btn-xs btn-danger" onclick="this.parentElement.remove()">✕</button>`;
  list.appendChild(row);
  row.querySelector('input').focus();
}
function saveStaffNames(){
  const getList=id=>[...document.querySelectorAll('#'+id+' input')].map(el=>el.value.trim()).filter(Boolean);

    shootEdit:      getList('shoot-list'),

  toast('Staff names saved ✓');

  render(); // refresh datalists

        <button class="btn btn-ghost" onclick="ui_leaveForm=false;ui_editLeaveId=null;render()">Cancel</button>
      </div>
    </div>`;
  }

  // Active / upcoming leaves
  if(!activeLeaves.length&&!ui_leaveForm){
    html+=`<div class="empty-state"><div class="empty-icon">🌴</div><div class="empty-msg">No active or upcoming leaves — click <strong>+ Add Leave</strong></div></div>`;
  } else {
    [...activeLeaves].sort((a,b)=>a.dateFrom.localeCompare(b.dateFrom)).forEach(l=>{ html+=renderLeaveCard(l,today,false); });
  }

  // Past leaves
  if(pastLeaves.length){
    html+=`<div class="shelved-toggle" onclick="ui_showPastLeaves=!ui_showPastLeaves;render()">
      <span>${ui_showPastLeaves?'▾':'▸'}</span>
      📁 ${pastLeaves.length} past leave record${pastLeaves.length>1?'s':''} — ${ui_showPastLeaves?'hide':'show'}
    </div>`;
    if(ui_showPastLeaves){
      [...pastLeaves].sort((a,b)=>b.dateFrom.localeCompare(a.dateFrom)).forEach(l=>{ html+=renderLeaveCard(l,today,true); });
    }
  }
  html+=`</div>`;
  return accHeaderL+html+'</div></div>';
}

function renderLeaveCard(l,today,isPast){
  const isOpen=ui_openLeaves.has(l.id);
  const days=leaveDays(l.dateFrom,l.dateTo);
  const isOnLeave=l.dateFrom<=today&&l.dateTo>=today;
  const isUpcoming=!isPast&&l.dateFrom>today;
  const typeInfo=LEAVE_TYPES.find(t=>t.key===l.leaveType)||LEAVE_TYPES[0];

  // Days left / days until start
  let durationLabel=days+'d';
  if(isOnLeave){
    const left=Math.round((new Date(l.dateTo+'T00:00:00')-new Date(today+'T00:00:00'))/86400000)+1;
    durationLabel=days+'d · '+left+'d remaining';
  } else if(isUpcoming){
    const until=Math.round((new Date(l.dateFrom+'T00:00:00')-new Date(today+'T00:00:00'))/86400000);
    durationLabel=days+'d · starts in '+until+'d';
  }

  // Format date parts separately for column alignment
  const fmtDateParts=d=>{
    if(!d) return {day:'—',month:'',year:'',weekday:''};
    try{
      const dt=new Date(d+'T00:00:00');
      return {
        day:   dt.toLocaleDateString('en-GB',{day:'2-digit'}),
        month: dt.toLocaleDateString('en-GB',{month:'short'}),
        year:  dt.getFullYear(),
        weekday: dt.toLocaleDateString('en-GB',{weekday:'long'}),
      };
    }catch(e){return {day:d,month:'',year:'',weekday:''};}
  };
  const fmtDate=d=>{
    const p=fmtDateParts(d);
    return `${p.day} ${p.month} ${p.year}, ${p.weekday}`;
  };
  const pFrom=fmtDateParts(l.dateFrom);
  const pTo=fmtDateParts(l.dateTo);
  const colStyle='display:grid;grid-template-columns:2.2ch 3.2ch 4.2ch 1fr;gap:0 7px;font-family:var(--mono);font-size:11.5px;color:var(--text2);flex:1;row-gap:4px;';
  const dateGrid=`<div style="${colStyle}">
    <span style="text-align:right">${pFrom.day}</span><span>${pFrom.month}</span><span>${pFrom.year}</span><span>${pFrom.weekday}</span>
    <span style="text-align:right">${pTo.day}</span><span>${pTo.month}</span><span>${pTo.year}</span><span>${pTo.weekday}</span>
  </div>`;
  const cardCls='leave-card'+(l.status==='approved'?' lc-approved':l.status==='pending'?' lc-pending':'')+(isPast?' lc-past':'')+(isOnLeave?' lc-today':'');
  return`<div class="${cardCls}" data-id="${l.id}">
  <div class="leave-top" onclick="toggleLeaveOpen('${l.id}')">
    <span class="leave-employee" style="min-width:130px;max-width:130px;overflow:hidden;text-overflow:ellipsis">${esc(l.employeeName||'Unknown')}</span>
    ${dateGrid}
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;flex-shrink:0">
      <span class="leave-type-badge ${typeInfo.cls}">${typeInfo.label}</span>
      <span class="leave-status-badge ${l.status==='approved'?'lsb-approved':'lsb-pending'}">${l.status==='approved'?'✓ Approved':'⏳ Pending'}</span>
      <span class="leave-duration">${durationLabel}</span>
    </div>
    <span class="chevron${isOpen?' open':''}" id="lc-${l.id}">▾</span>
  </div>
  <div class="leave-body${isOpen?' open':''}" id="lb-${l.id}">
    <div class="card-fields" style="margin-top:8px">
      <div><div class="cfield-label">Employee</div><div class="cfield-value">${esc(l.employeeName||'Unknown')}</div></div>
      <div><div class="cfield-label">Type</div><div class="cfield-value">${typeInfo.label}</div></div>
      <div><div class="cfield-label">Start</div><div class="cfield-value">${fmtDate(l.dateFrom)}</div></div>
      <div><div class="cfield-label">End</div><div class="cfield-value">${fmtDate(l.dateTo)}</div></div>
      <div><div class="cfield-label">Duration</div><div class="cfield-value">${days} day${days!==1?'s':''}</div></div>
      <div><div class="cfield-label">Status</div><div class="cfield-value">${l.status==='approved'?'✅ Approved':'⏳ Pending'}</div></div>
    </div>
    <div class="card-remarks" onclick="event.stopPropagation()">
      ${l.reason?`💬 ${esc(l.reason)} <button class="btn btn-ghost btn-xs" style="font-style:normal" onclick="event.stopPropagation();editLeave('${l.id}')" title="Edit reason">✏</button>`:`<button class="btn btn-ghost btn-xs" style="font-style:normal;color:var(--text3)" onclick="event.stopPropagation();editLeave('${l.id}')">+ Add reason</button>`}
    </div>
    <div class="leave-btns">
      ${l.status==='pending'
        ?`<button class="btn btn-done-active btn-sm" onclick="updateLeave('${l.id}',{status:'approved'});render();event.stopPropagation()">✅ Approve</button>`
        :`<button class="btn btn-ghost btn-sm" onclick="updateLeave('${l.id}',{status:'pending'});render();event.stopPropagation()">↩ Set Pending</button>`
      }
      <button class="btn btn-ghost btn-sm" onclick="editLeave('${l.id}');event.stopPropagation()">✏ Edit</button>
      <button class="btn btn-ghost btn-sm btn-danger" onclick="if(confirm('Delete this leave record?'))deleteLeave('${l.id}');event.stopPropagation()">🗑 Delete</button>
    </div>
  </div>
</div>`;
}

/* ─── CARD ─── */
function renderCard(sec,s,archKey){
  const secObj=SECTIONS.find(ss=>ss.key===sec)||{};
  const isUpcoming=secObj.isUpcoming||false;
  if(isUpcoming) return renderUpcomingRow(sec,s,archKey);

}

function renderUpcomingRow(sec,s,archKey){
  const isOpen=ui.openCards.has(s.id);
  const isComplOpen=ui.complForms.has(s.id);
  const archKeyJS=archKey?`'${archKey}'`:'null';
  const today=todayStr();

  const sbL=s.status==='urgent'?'Urgent':s.status==='in-progress'?'In Progress':s.status==='completed'?'Completed':s.status==='on-hold'?'On Hold':s.status==='not-done'?'Not Done':s.status==='postponed'?'Postponed':s.status==='shelved'?'Shelved':'';
  const sbC=s.status==='urgent'?'sb-urgent':s.status==='in-progress'?'sb-in-progress':s.status==='completed'?'sb-completed':s.status==='on-hold'?'sb-on-hold':s.status==='not-done'?'sb-not-done':s.status==='postponed'?'sb-postponed':s.status==='shelved'?'sb-shelved':'sb-not-started';

  // Due chip
  let dueChip='';
  if(s.expected_date){
    const diff=new Date(s.expected_date+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime();
    const days=Math.round(diff/86400000);
    if(s.expected_date<today) dueChip=`<span class="uc-chip uc-chip-overdue">⚠ Overdue</span>`;
    else if(days===0) dueChip=`<span class="uc-chip uc-chip-due">📅 Today</span>`;
    else dueChip=`<span class="uc-chip uc-chip-due">📅 in ${days}d</span>`;
  }

  // Border class
  let rowCls='uc-row';
  if(s.status==='completed') rowCls+=' ucr-completed';
  else if(s.status==='on-hold') rowCls+=' ucr-on-hold';
  else if(s.expected_date&&s.expected_date<today) rowCls+=' ucr-overdue';

  const typeLabel=s.expected_type&&s.expected_type!=='date'?` (${s.expected_type})`:'';
  const corrChip=s.correspondent?`<span class="uc-chip">👤 ${esc(s.correspondent)}</span>`:'';

  const field=(lbl,val)=>val?`<div><div class="cfield-label">${lbl}</div><div class="cfield-value">${esc(val)}</div></div>`:'';
  let linksHtml='';
  if(s.links){ const ls=s.links.split(',').map(l=>l.trim()).filter(Boolean); if(ls.length) linksHtml=`<div class="card-links" style="margin-top:8px">${ls.map(l=>`<a class="link-pill" href="${esc(l)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 ${esc(l.replace(/^https?:\/\//,'').slice(0,36))}</a>`).join('')}</div>`; }
  let clHtml='';
  if(s.completion_links){ const ls=s.completion_links.split(',').map(l=>l.trim()).filter(Boolean); if(ls.length) clHtml=`<div class="completion-links">${ls.map(l=>`<a class="link-pill" href="${esc(l)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 ${esc(l.replace(/^https?:\/\//,'').slice(0,36))}</a>`).join('')}</div>`; }

  return`<div class="${rowCls}" data-id="${s.id}">
  <div class="uc-top" onclick="toggleCard('${s.id}')">
    <span class="uc-expand-icon${isOpen?' open':''}">▶</span>
    <span class="uc-title">${esc(s.title||'Untitled')}</span>
    <div class="uc-meta-line">
      ${corrChip}
      ${s.expected_date?`<span class="uc-chip">${esc(s.expected_date)}${typeLabel}</span>`:''}
      ${dueChip}
      ${s.deadline_date?`<span class="uc-chip">⏱ ${esc(s.deadline_date)}</span>`:''}
      ${sbL?`<span class="sbadge ${sbC}">${sbL}</span>`:''}
    </div>
    <button class="btn btn-ghost btn-xs btn-danger" style="flex-shrink:0;padding:3px 7px" onclick="event.stopPropagation();confirmDelete('${sec}','${s.id}',${archKeyJS})" title="Delete">🗑</button>
    <span class="chevron${isOpen?' open':''}" id="ch-${s.id}" style="display:none"></span>
  </div>
  <div class="uc-body${isOpen?' open':''}" id="cb-${s.id}">
    <div class="card-fields">
      ${field('Detail',s.detail)}
      ${field('Correspondent',s.correspondent)}
      ${field('Expected',s.expected_date?s.expected_date+typeLabel:'')}
      ${s.deadline_date?field('Deadline',s.deadline_date+(s.deadline_uk?' · '+s.deadline_uk+' '+ukLabel():'')+(s.deadline_ist?' / '+s.deadline_ist+' IST':'')):''}
      ${s.reminder&&s.reminder!=='off'?field('Reminder','⏰ '+s.reminder):''}
    </div>
    ${remarksHTML(s.remarks, s.id+'_cr', sec, s.id, archKey)}
    ${linksHtml}
    ${s.completion_note||s.completion_links?`<div class="completion-box"><div class="completion-label">✅ Completion Notes</div>${s.completion_note?`<div class="completion-note">${esc(s.completion_note)}</div>`:''} ${clHtml}</div>`:''}
    <div id="compl-form-${s.id}" style="display:${isComplOpen?'block':'none'}">
      <div class="compl-form">
        <div style="font-size:12px;font-weight:700;color:var(--done);margin-bottom:9px">✅ Completion notes</div>
        <div class="fgroup" style="margin-bottom:8px"><label class="flabel">What was done / outcome</label><textarea class="ftextarea" id="compl-note-${s.id}" style="min-height:52px">${esc(s.completion_note||'')}</textarea></div>
        <div class="fgroup" style="margin-bottom:9px"><label class="flabel">Final links</label><input class="finput" id="compl-links-${s.id}" placeholder="https://…" value="${esc(s.completion_links||'')}"></div>
        <div style="display:flex;gap:7px"><button class="btn btn-done-active btn-sm" onclick="submitComplForm('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">✅ Save &amp; Mark Done</button><button class="btn btn-ghost btn-sm" onclick="toggleComplForm('${s.id}');event.stopPropagation()">Cancel</button></div>
      </div>
    </div>
    <div class="card-btns">
      <button class="btn btn-ghost btn-sm" onclick="editStory('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">✏ Edit</button>

        ?`<button class="btn btn-done-active btn-sm" disabled>✅ Done</button>

        :`<button class="btn btn-done btn-sm" onclick="toggleComplForm('${s.id}');event.stopPropagation()">Mark Done</button>`
      }
      <button class="btn btn-ghost btn-sm btn-danger" onclick="confirmDelete('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">🗑 Delete</button>
    </div>
  </div>
</div>`;
}

function updateExpectedInput(sec,archKey){
  const sfx='-'+sec+(archKey?'-arch':'');
  const t=(document.getElementById('f-expected-type'+sfx)||{}).value||'date';
  const inp=document.getElementById('f-expected-date'+sfx);
  if(inp){ inp.type=t==='month'?'month':'date'; inp.value=''; }
}

/* ════════════════════════════════════════
   HELPERS
════════════════════════════════════════ */
function esc(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg){ const w=document.getElementById('toast-wrap'); if(!w) return; const el=document.createElement('div'); el.className='toast'; el.textContent=msg; w.appendChild(el); setTimeout(()=>el.remove(),3800); }
function confirmDelete(sec,id,archKey){ const arr=getArr(sec,archKey); const s=arr?.find(s=>s.id===id); if(!s) return; if(confirm('Delete "'+s.title+'"?')) deleteStory(sec,id,archKey); }

/* ════════════════════════════════════════
   CLOCK
════════════════════════════════════════ */
function updateClock(){
  const el=document.getElementById('live-clock'); if(!el) return;
  const now=new Date();
  const uk=now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/London'});
  const ist=now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Kolkata'});
  el.textContent='UK '+uk+' · IST '+ist;
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
function init(){
  loadLocal();
  checkDateChange();
  scheduleAllReminders();
  const cfg=getFireConfig(); if(cfg) initFirebase(cfg, true);
  window.addEventListener('online', ()=>{ if(fireDb){ setSyncUI('syncing'); pushToCloud(); } });
  window.addEventListener('offline', ()=>{ if(fireDb) setSyncUI('offline'); });
  updateDateHeader(); renderDateStrip(); render();
  renderOnLeavePill();
  // Show backup banners after render (only on today view)
  setTimeout(()=>renderBackupBanners(), 100);
  updateClock(); setInterval(updateClock, 30000);
  initScrollHeader();

  // Hide bottom nav when keyboard is open (iOS)
  const bnb=document.getElementById('bottom-nav-bar');
  if(bnb){
    window.addEventListener('resize',()=>{
      // When keyboard opens, window height shrinks significantly
      const keyboardOpen=window.innerHeight<window.screen.height*0.75;
      bnb.style.display=keyboardOpen?'none':'';
    });
  }

  // Check every 5 minutes if the date has changed (midnight rollover)
  // Also refreshes the header date so it never shows yesterday's date
  setInterval(()=>{
    const today=todayStr();
    if(state.lastActiveDate && state.lastActiveDate !== today){
      // New day detected while app is open — run the full date-change logic
      checkDateChange();
      updateDateHeader();
      renderDateStrip();
      render();
      setTimeout(()=>renderBackupBanners(), 100);
    }
    // Always refresh the date in the header in case it got stale
    updateDateHeader();
  }, 5 * 60 * 1000);
}
document.addEventListener('DOMContentLoaded', init);
